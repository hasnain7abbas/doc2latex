name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Python: lint & test ──────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Install with ML deps gated off so CI stays fast and reproducible.
          pip install -e ".[dev]"
          # Force-install the minimum reader deps that aren't auto-included on 3.12.
          pip install pdfplumber pytesseract pymupdf python-docx Pillow

      - name: Run pytest
        run: pytest -q

  # ─── Tauri frontend + Rust check ──────────────────────────────
  tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Type check frontend
        run: bun run build

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

  # ─── Android Gradle check ─────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle build (assembleDebug)
        working-directory: android-app
        run: |
          # If the wrapper is missing (first run), bootstrap one.
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          ./gradlew :app:assembleDebug --stacktrace
